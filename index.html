<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlantis MC</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Canvas: tüm sayfanın arkasında sabit durur -->
<div class="ocean-bg"></div>
<div class="caustics-layer"></div>
<canvas id="bg-canvas"></canvas>

<div class="page-wrapper">
  <header>
    <a href="index.html" class="logo"><span class="blade">⚔️</span> ATLANTİS MC</a>
    <nav>
      <a href="index.html" class="active">Ana Sayfa</a>
      <a href="oy-verme.html">Oy Verme</a>
      <a href="haberler.html">Haberler</a>
      <a href="hakkimizda.html">Hakkımızda</a>
      <a href="iletisim.html">İletişim</a>
    </nav>
  </header>

  <main>
    <div class="card hero">
      <span class="blade-big">⚔️</span>
      <h1>ATLANTİS MC</h1>
      <div class="tagline">Yeni Nesil Minecraft Deneyimi</div>

      <div class="ip-box">
        <span class="ip-text" id="server-ip">atlantis.minecraft.party</span>
        <button class="copy-btn" onclick="copyIP()">ᴋᴏᴘʏᴀʟᴀ</button>
      </div>

      <div class="status-box">
        <div class="status-line">
          <span class="dot" id="status-dot"></span>
          <span id="status-sub">Durum kontrol ediliyor...</span>
        </div>
        <div class="status-players" id="status-players"></div>
      </div>
    </div>
  </main>

  <footer>© 2026 Atlantis MC — Tüm hakları saklıdır.</footer>
</div>

<script src="script.js"></script>
</body>
</html>
